<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real or Not?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEF1F5;
    --ink: #14181F;
    --blue: #2952FF;
    --yellow: #FFC940;
    --magenta: #FF3D8A;
    --cyan: #00C2D1;
    --card: #FFFFFF;
    --display: "Bricolage Grotesque", sans-serif;
    --mono: "Space Mono", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--display);
    overflow: hidden;
    /* subtle dot grid, like photo-lab registration marks */
    background-image: radial-gradient(rgba(20,24,31,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .screen.active { display: flex; }

  /* ---------- LANDING ---------- */

  #landing { text-align: center; gap: 32px; }

  .eyebrow {
    font-family: var(--mono);
    font-size: clamp(12px, 1.4vw, 15px);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--blue);
  }

  h1 {
    font-size: clamp(56px, 11vw, 148px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.02em;
  }

  /* signature: "Not?" carries an RGB-split glitch — the synthetic half of the headline */
  .glitch {
    position: relative;
    display: inline-block;
    color: var(--ink);
  }
  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .glitch::before { color: var(--magenta); z-index: -1; animation: shiftA 3.2s infinite steps(1); }
  .glitch::after  { color: var(--cyan);    z-index: -2; animation: shiftB 3.2s infinite steps(1); }

  @keyframes shiftA {
    0%, 88%  { transform: translate(4px, 3px); }
    90%      { transform: translate(-6px, 2px); }
    93%      { transform: translate(5px, -4px); }
    96%      { transform: translate(-3px, 3px); }
    100%     { transform: translate(4px, 3px); }
  }
  @keyframes shiftB {
    0%, 88%  { transform: translate(-4px, -3px); }
    90%      { transform: translate(6px, -2px); }
    93%      { transform: translate(-5px, 4px); }
    96%      { transform: translate(3px, -3px); }
    100%     { transform: translate(-4px, -3px); }
  }

  @media (prefers-reduced-motion: reduce) {
    .glitch::before { animation: none; transform: translate(4px, 3px); }
    .glitch::after  { animation: none; transform: translate(-4px, -3px); }
  }

  .instructions {
    max-width: 640px;
    font-size: clamp(16px, 2vw, 21px);
    line-height: 1.55;
    font-weight: 400;
  }

  .btn-start {
    font-family: var(--display);
    font-size: clamp(20px, 2.4vw, 28px);
    font-weight: 700;
    color: #fff;
    background: var(--blue);
    border: none;
    border-radius: 999px;
    padding: 20px 64px;
    cursor: pointer;
    box-shadow: 0 6px 0 #1B36AD;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn-start:hover { transform: translateY(2px); box-shadow: 0 4px 0 #1B36AD; }
  .btn-start:active { transform: translateY(6px); box-shadow: 0 0 0 #1B36AD; }
  .btn-start:focus-visible { outline: 3px solid var(--ink); outline-offset: 4px; }

  /* ---------- VIEWER ---------- */

  #viewer { gap: 20px; }

  .btn-restart {
    position: absolute;
    top: 20px;
    left: 20px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 12px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }
  .btn-restart:hover { background: var(--yellow); }
  .btn-restart:focus-visible { outline: 3px solid var(--blue); outline-offset: 3px; }

  .pair-counter {
    font-family: var(--mono);
    font-size: clamp(13px, 1.5vw, 16px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--yellow);
    padding: 8px 20px;
    border-radius: 4px;
    transform: rotate(-1.2deg);
  }

  .stage {
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vw, 40px);
    width: 100%;
    max-width: 1400px;
    justify-content: center;
  }

  .pair {
    display: flex;
    gap: clamp(16px, 3vw, 48px);
    flex: 1;
    justify-content: center;
    min-width: 0;
  }

  /* photo-print card: white border like a lab print, taped evidence tag below */
  .photo {
    background: var(--card);
    padding: 14px 14px 0;
    border: 2px solid var(--ink);
    box-shadow: 8px 8px 0 rgba(20,24,31,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: min(42vw, 560px);
    flex: 1;
    min-width: 0;
  }
  .photo:first-child { transform: rotate(-0.6deg); }
  .photo:last-child  { transform: rotate(0.6deg); }

  .photo img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
    background:
      repeating-linear-gradient(45deg, #E4E8EE 0 12px, #EEF1F5 12px 24px);
  }

  .tag {
    font-family: var(--mono);
    font-size: clamp(18px, 2.4vw, 26px);
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 12px 0 16px;
  }

  .arrow {
    font-family: var(--display);
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: clamp(56px, 6vw, 76px);
    height: clamp(56px, 6vw, 76px);
    font-size: clamp(24px, 3vw, 34px);
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 4px 4px 0 rgba(20,24,31,0.15);
    transition: background 0.1s ease;
  }
  .arrow:hover:not(:disabled) { background: var(--yellow); }
  .arrow:disabled { opacity: 0.25; cursor: default; box-shadow: none; }
  .arrow:focus-visible { outline: 3px solid var(--blue); outline-offset: 3px; }

  .hint {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    color: rgba(20,24,31,0.55);
  }

  /* stack vertically on narrow / portrait screens */
  @media (max-width: 760px) {
    .pair { flex-direction: column; align-items: center; }
    .photo { max-width: min(78vw, 420px); }
    #viewer { overflow-y: auto; justify-content: flex-start; padding-top: 84px; }
  }
</style>
</head>
<body>

  <!-- ============ LANDING PAGE ============ -->
  <section id="landing" class="screen active">
    <p class="eyebrow">A spot-the-difference challenge</p>
    <h1>Real or <span class="glitch" data-text="Not?">Not?</span></h1>
    <p class="instructions">
      <!-- Replace this with your instructions -->
      One of these images is a real photograph. The other was generated by AI.
      Look closely at each pair, then decide: which one is the real deal?
      Cast your vote at the station before moving on.
    </p>
    <button class="btn-start" id="startBtn">Start</button>
  </section>

  <!-- ============ IMAGE VIEWER ============ -->
  <section id="viewer" class="screen">
    <button class="btn-restart" id="restartBtn" aria-label="Restart from the beginning">&#8635; Restart</button>

    <div class="pair-counter" id="pairCounter">Pair 1 of 4</div>

    <div class="stage">
      <button class="arrow" id="prevBtn" aria-label="Previous pair">&#8592;</button>

      <div class="pair">
        <figure class="photo">
          <img id="imgA" src="" alt="Image A of the current pair">
          <figcaption class="tag" id="tagA">1A</figcaption>
        </figure>
        <figure class="photo">
          <img id="imgB" src="" alt="Image B of the current pair">
          <figcaption class="tag" id="tagB">1B</figcaption>
        </figure>
      </div>

      <button class="arrow" id="nextBtn" aria-label="Next pair">&#8594;</button>
    </div>

    <p class="hint">Use the arrows to move between pairs</p>
  </section>

<script>
  // ============ CONFIG ============
  const TOTAL_PAIRS = 4;
  const IMAGE_FOLDER = "images/";      // put your files in this folder
  const IMAGE_EXT = ".jpg";            // change to ".png" etc. if needed
  const INACTIVITY_LIMIT_MS = 60 * 1000; // 1 minute

  // ============ ELEMENTS ============
  const landing     = document.getElementById("landing");
  const viewer      = document.getElementById("viewer");
  const startBtn    = document.getElementById("startBtn");
  const restartBtn  = document.getElementById("restartBtn");
  const prevBtn     = document.getElementById("prevBtn");
  const nextBtn     = document.getElementById("nextBtn");
  const imgA        = document.getElementById("imgA");
  const imgB        = document.getElementById("imgB");
  const tagA        = document.getElementById("tagA");
  const tagB        = document.getElementById("tagB");
  const pairCounter = document.getElementById("pairCounter");

  let currentPair = 1;
  let inactivityTimer = null;

  // ============ SCREEN SWITCHING ============
  function showLanding() {
    viewer.classList.remove("active");
    landing.classList.add("active");
    stopInactivityTimer();
  }

  function showViewer() {
    landing.classList.remove("active");
    viewer.classList.add("active");
    currentPair = 1;
    renderPair();
    resetInactivityTimer();
  }

  // ============ PAIR RENDERING ============
  function renderPair() {
    imgA.src = IMAGE_FOLDER + currentPair + "A" + IMAGE_EXT;
    imgB.src = IMAGE_FOLDER + currentPair + "B" + IMAGE_EXT;
    imgA.alt = "Image " + currentPair + "A";
    imgB.alt = "Image " + currentPair + "B";
    tagA.textContent = currentPair + "A";
    tagB.textContent = currentPair + "B";
    pairCounter.textContent = "Pair " + currentPair + " of " + TOTAL_PAIRS;
    prevBtn.disabled = currentPair === 1;
    nextBtn.disabled = currentPair === TOTAL_PAIRS;
  }

  function nextPair() {
    if (currentPair < TOTAL_PAIRS) { currentPair++; renderPair(); }
  }

  function prevPair() {
    if (currentPair > 1) { currentPair--; renderPair(); }
  }

  // ============ INACTIVITY RESET ============
  function stopInactivityTimer() {
    if (inactivityTimer) { clearTimeout(inactivityTimer); inactivityTimer = null; }
  }

  function resetInactivityTimer() {
    stopInactivityTimer();
    inactivityTimer = setTimeout(showLanding, INACTIVITY_LIMIT_MS);
  }

  // Any interaction while on the viewer rearms the timer
  ["click", "touchstart", "pointerdown", "keydown", "mousemove"].forEach(evt => {
    document.addEventListener(evt, () => {
      if (viewer.classList.contains("active")) resetInactivityTimer();
    }, { passive: true });
  });

  // ============ EVENTS ============
  startBtn.addEventListener("click", showViewer);
  restartBtn.addEventListener("click", showLanding);
  nextBtn.addEventListener("click", nextPair);
  prevBtn.addEventListener("click", prevPair);

  // Keyboard support: arrow keys flip pairs, Escape restarts
  document.addEventListener("keydown", e => {
    if (!viewer.classList.contains("active")) return;
    if (e.key === "ArrowRight") nextPair();
    if (e.key === "ArrowLeft")  prevPair();
    if (e.key === "Escape")     showLanding();
  });
</script>
</body>
</html>
